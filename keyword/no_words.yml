category: no_words
description: "Keywords that should NEVER be detected as PII (False Positive filtering)"

no_words:
  # General terms often mistaken for names or other PII
  general:
    - "Anonymous"
    - "System"
    - "Admin"
    - "User"
    - "Placeholder"
    - "Template"
    - "Unknown"
    - "N/A"
    - "None"

