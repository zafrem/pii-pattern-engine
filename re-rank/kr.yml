# Scoring formula: final_score = min(keyword_avg + context_bonus + regex_score, 100)
# keyword_scores : 0–100  (higher = stronger PII indicator)
# context_bonus  : flat points added when a labeled field prefix is detected
# regex_scores   : 0–50   (50 = checksum-validated, 30 = broad pattern)

