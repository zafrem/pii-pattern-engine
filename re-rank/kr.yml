    context_bonus:
      "이름:": 20
      "성명:": 20
      "Name:": 15
    regex_scores:
      name_01: 30              # broad Hangul char-class → lower specificity
    sum_example:
      keyword_hits: [50, 60]
      keyword_avg: 55
      context_bonus: 20
      regex_score: 30
      final_score: 100         # 55+20+30 = 105 → capped to 100
