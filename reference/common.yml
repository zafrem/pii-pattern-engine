version: "1.0"
region: Common / International
region_code: COMM
code_series: 9001-9099
description: Internal reference codes for common/cross-regional PII entities, mapping regex patterns and keyword categories.

entities:

  common_email:
    code: 9001
    description: Email address (RFC 5322 simplified, user@domain.tld)
    category: contact
    pii_type: contact
    severity: medium
    regex:
      - source: regex/pii/common/email.yml
        pattern_id: email_01
        pattern: '[a-zA-Z0-9._%+-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}'
        mask: '***@***.***'
    keyword:
      - source: keyword/contact.yml
        category: email
        relevant_terms: [email, e-mail, email address, mail, 이메일, メール, 电子邮件, correo, courriel]
        relevant_contexts: ["Email:", "E-mail:", "Contact:"]
    rerank:
      source: re-rank/scoring.yml
      category: email

  common_name_en:
    code: 9002
    description: English person name pattern (Title? First Last)
    category: name
    pii_type: personal
    severity: low
    regex:
      - source: regex/pii/common/name.yml
        pattern_id: name_en_01
    keyword:
      - source: keyword/personal.yml
        category: name
        relevant_terms: [name, full name, first name, last name, given name, surname]
        relevant_contexts: ["Name:", "Full Name:"]
    rerank:
      source: re-rank/scoring.yml
      category: name

  common_date_iso:
    code: 9003
    description: ISO 8601 date (YYYY-MM-DD)
    category: temporal
    pii_type: personal
    severity: low
    regex:
      - source: regex/pii/common/date.yml
        pattern_id: date_iso_01
    keyword:
      - source: keyword/personal.yml
        category: date_of_birth
        relevant_terms: [date of birth, dob, birthday, birth date, born]
        relevant_contexts: ["DOB:", "Date of Birth:"]
    rerank:
      source: re-rank/scoring.yml
      category: date_of_birth

  common_date_slash:
    code: 9004
    description: Slash-separated date (MM/DD/YYYY or DD/MM/YYYY)
    category: temporal
    pii_type: personal
    severity: low
    regex:
