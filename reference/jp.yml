        relevant_contexts: ["パスポート番号:", "旅券番号:"]
    rerank:
      source: re-rank/scoring.yml
      category: passport

  jp_driver_license:
    code: 2006
    description: Japanese driver's license number (運転免許証番号, 12 digits)
    category: identification
