version: "1.0"
region: Japan
region_code: JP
code_series: 2001-2099
description: Internal reference codes for Japanese PII entities, mapping regex patterns and keyword categories.

entities:

  jp_name_kanji:
    code: 2001
    description: Japanese personal name written in Kanji (漢字 2–4 characters)
    category: name
    pii_type: personal
    severity: high
    regex:
      - source: regex/pii/jp/other.yml
        pattern_id: japanese_name_kanji_01
        pattern: '[一-鿿]{2,4}'
        verification: japanese_name_kanji_valid
        mask: '***'
    keyword:
      - source: keyword/personal.yml
        category: name
        relevant_terms: [名前, 氏名, 姓名, full name, name]
        relevant_contexts: ["氏名:", "名前:"]
    rerank:
      source: re-rank/scoring.yml
      category: name

  jp_name_hiragana:
    code: 2002
    description: Japanese personal name written in Hiragana (ひらがな 2–8 characters)
    category: name
    pii_type: personal
    severity: high
    regex:
      - source: regex/pii/jp/other.yml
        pattern_id: japanese_name_hiragana_01
        pattern: '[ぁ-ゟ]{2,8}'
        mask: '***'
    keyword:
      - source: keyword/personal.yml
        category: name
        relevant_terms: [名前, 氏名, ふりがな, よみがな]
        relevant_contexts: ["ふりがな:", "よみがな:"]
    rerank:
      source: re-rank/scoring.yml
      category: name

  jp_name_katakana:
    code: 2003
    description: Japanese personal name written in Katakana (カタカナ 2–8 characters)
    category: name
    pii_type: personal
    severity: high
    regex:
      - source: regex/pii/jp/other.yml
        pattern_id: japanese_name_katakana_01
        pattern: '[゠-ヿ]{2,8}'
        mask: '***'
    keyword:
      - source: keyword/personal.yml
        category: name
        relevant_terms: [名前, 氏名, フリガナ, カタカナ]
        relevant_contexts: ["フリガナ:"]
    rerank:
      source: re-rank/scoring.yml
      category: name

  jp_my_number:
    code: 2004
    description: Japanese Individual Number / My Number (マイナンバー, 12-digit national ID)
    category: identification
    pii_type: government_id
    severity: critical
    regex:
      - source: regex/pii/jp/identification.yml
        pattern_id: my_number_01
    keyword:
      - source: keyword/identification.yml
        category: national_id
        relevant_terms: [マイナンバー, 個人番号, 個人番号カード, my number]
        relevant_contexts: ["マイナンバー:", "個人番号:"]
    rerank:
      source: re-rank/scoring.yml
      category: jp_my_number

  jp_passport:
    code: 2005
    description: Japanese passport number (旅券番号)
    category: identification
    pii_type: government_id
    severity: high
