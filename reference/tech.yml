version: "1.0"
region: Tech / Tokens
region_code: TECH
code_series: 9501-9599
description: Internal reference codes for technical secrets and API tokens, mapping regex patterns and keyword categories.

entities:

  tech_generic_token:
    code: 9501
    description: Generic high-entropy secret token (32–64 hex/base64 chars)
    category: secret
    pii_type: credential
    severity: critical
    regex:
      - source: regex/hash/tokens.yml
        pattern_id: generic_token_01
    keyword:
      - source: keyword/network.yml
        category: url
        relevant_terms: [token, secret, key, api key, auth token, bearer]
        relevant_contexts: ["Token:", "Secret:", "Bearer:"]
    rerank:
      source: re-rank/scoring.yml
      category: ip_address

