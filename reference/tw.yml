version: "1.0"
region: Taiwan
region_code: TW
code_series: 4001-4099
description: Internal reference codes for Taiwanese PII entities, mapping regex patterns and keyword categories.

entities:

  tw_name:
    code: 4001
    description: Traditional Chinese personal name (繁體中文 2–4 characters)
    category: name
    pii_type: personal
    severity: high
    regex:
      - source: regex/pii/tw/other.yml
        pattern_id: chinese_name_01
        pattern: '[一-鿿]{2,4}'
        verification: chinese_name_valid
        mask: '***'
    keyword:
      - source: keyword/personal.yml
        category: name
        relevant_terms: [姓名, 名字, 全名, name]
        relevant_contexts: ["姓名:", "名字:"]
    rerank:
      source: re-rank/scoring.yml
      category: name

  tw_national_id:
    code: 4002
    description: Taiwan National Identification Card number (身分證號碼, letter + 9 digits)
    category: identification
    pii_type: government_id
    severity: critical
    regex:
      - source: regex/pii/tw/identification.yml
        pattern_id: national_id_01
    keyword:
      - source: keyword/identification.yml
        category: national_id
        relevant_terms: [身份證, 身分證, 身份證號碼, 國民身分證, id card]
        relevant_contexts: ["身分證號:", "國民身分證:"]
    rerank:
      source: re-rank/scoring.yml
      category: kr_rrn

  tw_passport:
    code: 4003
    description: Taiwanese passport number (護照號碼)
    category: identification
    pii_type: government_id
    severity: high
    regex:
      - source: regex/pii/tw/identification.yml
        pattern_id: passport_01
    keyword:
      - source: keyword/identification.yml
        category: passport
        relevant_terms: [護照, 護照號碼, passport, passport number]
        relevant_contexts: ["護照號碼:", "Passport:"]
    rerank:
      source: re-rank/scoring.yml
      category: passport

  tw_phone_mobile:
    code: 4004
    description: Taiwanese mobile phone number (09XX-XXX-XXX)
    category: phone
    pii_type: contact
    severity: medium
    regex:
      - source: regex/pii/tw/phone.yml
        pattern_id: mobile_01
      - source: regex/pii/tw/phone.yml
        pattern_id: mobile_02
    keyword:
      - source: keyword/contact.yml
        category: phone
        relevant_terms: [手機, 電話號碼, 聯絡電話, mobile, phone]
        relevant_contexts: ["手機:", "電話:"]
    rerank:
      source: re-rank/scoring.yml
      category: phone

  tw_phone_landline:
    code: 4005
    description: Taiwanese landline phone number (area code + 7–8 digits)
    category: phone
    pii_type: contact
    severity: medium
    regex:
      - source: regex/pii/tw/phone.yml
        pattern_id: landline_01
      - source: regex/pii/tw/phone.yml
        pattern_id: landline_02
    keyword:
      - source: keyword/contact.yml
        category: phone
        relevant_terms: [電話, 固定電話, 座機, telephone]
        relevant_contexts: ["電話:", "Tel:"]
    rerank:
      source: re-rank/scoring.yml
      category: phone

  tw_address:
    code: 4006
    description: Taiwanese physical address (city/county + district + road + number)
    category: address
    pii_type: location
    severity: high
    regex:
      - source: regex/pii/tw/other.yml
        pattern_id: address_simple_01
    keyword:
      - source: keyword/contact.yml
        category: address
        relevant_terms: [地址, 住址, 通訊地址, address]
        relevant_contexts: ["地址:", "住址:"]
      - source: keyword/address.yml
        category: address_cn
    rerank:
      source: re-rank/scoring.yml
      category: address

  tw_business_id:
    code: 4007
    description: Taiwan Business Uniform Number (統一編號, 8 digits)
    category: business
    pii_type: organizational
    severity: medium
    regex:
      - source: regex/pii/tw/other.yml
        pattern_id: business_id_01
        pattern: '[0-9]{8}'
        mask: '********'
    keyword:
      - source: keyword/identification.yml
        category: national_id
        relevant_terms: [統一編號, 公司統編, 統編]
        relevant_contexts: ["統一編號:"]
    rerank:
      source: re-rank/scoring.yml
      category: kr_rrn

  tw_bank_bank_of_taiwan:
    code: 4008
    description: Bank of Taiwan (臺灣銀行) account number
    category: financial
    pii_type: financial
    severity: critical
    regex:
      - source: regex/pii/tw/banks.yml
