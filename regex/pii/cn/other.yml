namespace: cn
description: China other patterns (social credit, names, addresses)
patterns:
- id: social_credit_01
  location: cn
  category: other
  description: Chinese Unified Social Credit Code (18 characters)
  pattern: '[0-9A-Z]{18}'
  flags:
  - IGNORECASE
  mask: '******************'
  examples:
    match:
    - 91110000MA00123456
    - 12345678901234567A
    - 91320100MA1B2C3D4E
    - 91440300567891234X
    - 91110101ABCD123456
    nomatch:
    - 9111000MA00123456
    - 91110000MA0012345678
    - 91110000MA001234567
    - 91110000-MA0012345
    - 9111 0000 MA001234
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  match_type: exactly_matches
  langs:
    python: '[0-9A-Z]{18}'
    go: '[0-9A-Z]{18}'
    java: '[0-9A-Z]{18}'
    javascript: '[0-9A-Z]{18}'
- id: chinese_name_01
  location: cn
  category: name
  description: Simplified Chinese name (2-4 characters)
  pattern: '[一-鿿]{2,4}'
  verification: chinese_name_valid
  mask: '***'
  examples:
    match:
    - 王小明
    - 李美丽
    - 陈志强
    - 林雅婷
    - 欧阳修
    - 张伟
    - 刘芳
    - 司马迁
    nomatch:
    - 王
    - abcd
    - '123'
    - A
    - 学习
    - 任务
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  metadata:
    note: Matches Simplified Chinese names with known surname prefixes. Uses surname
      verification to reduce false positives.
  match_type: exactly_matches
  langs:
    python: '[一-鿿]{2,4}'
    go: '[一-鿿]{2,4}'
    java: '[一-鿿]{2,4}'
    javascript: '[一-鿿]{2,4}'

- id: address_01
  location: cn
  category: address
  description: Chinese Address (Province + City + District/Street)
  pattern: '(?:北京市|天津市|河北省|山西省|内蒙古自治区|辽宁省|吉林省|黑龙江省|上海市|江苏省|浙江省|安徽省|福建省|江西省|山东省|河南省|湖北省|湖南省|广东省|广西壮族自治区|海南省|重庆市|四川省|贵州省|云南省|西藏自治区|陕西省|甘肃省|青海省|宁夏回族自治区|新疆维吾尔自治区|香港特别行政区|澳门特别行政区|台湾省)(?:[一-鿿]{2,10}(?:市|区|县))(?:[一-鿿0-9]{2,20}(?:路|街|巷|号))?'
  verification: chinese_address_valid
  mask: '*** *** ***'
  examples:
    match:
    - 北京市东城区王府井大街1号
    - 广东省广州市天河区中山大道
    nomatch:
    - 北京市
    - 东城区
    - 美国纽约
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  metadata:
    note: Uses address database verification to ensure valid province and city combinations.
  match_type: exactly_matches
  langs:
    python: '(?:北京市|天津市|河北省|山西省|内蒙古自治区|辽宁省|吉林省|黑龙江省|上海市|江苏省|浙江省|安徽省|福建省|江西省|山东省|河南省|湖北省|湖南省|广东省|广西壮族自治区|海南省|重庆市|四川省|贵州省|云南省|西藏自治区|陕西省|甘肃省|青海省|宁夏回族自治区|新疆维吾尔自治区|香港特别行政区|澳门特别行政区|台湾省)(?:[一-鿿]{2,10}(?:市|区|县))(?:[一-鿿0-9]{2,20}(?:路|街|巷|号))?'
