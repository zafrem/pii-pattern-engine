namespace: comm
description: Common Financial Identifiers (BIC/SWIFT, etc.)

patterns:
  - id: swift_bic
    verification: swift_bic_valid
    location: comm
    category: financial
    description: SWIFT/BIC Code (8 or 11 characters)
    pattern: '[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?'
    flags: [IGNORECASE]
    mask: "********"
    examples:
      match:
        - "ABCDUS33"
        - "WREKJPJTXXX"
      nomatch:
        - "ABCDEUS33"
        - "ABCDUS3"
    policy:
      store_raw: true
      action_on_match: report
      severity: medium
    match_type: exactly_matches
    langs:
      python: '[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?'
      go: '[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?'
      java: '[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?'
      javascript: '[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?'
