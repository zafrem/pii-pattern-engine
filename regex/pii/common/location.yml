namespace: comm
description: Location-related data (Coordinates)

patterns:
  - id: latitude_01
    location: comm
    category: location
    description: Decimal latitude (4+ decimal places)
    pattern: '-?([1-8]?\d(\.\d{4,})?|90(\.0{4,})?)'
    mask: "##.####"
    verification: latitude_valid
    examples:
      match:
        - "37.1234"
        - "-45.67890"
      nomatch:
        - "91.0000"
        - "37.123"
    policy:
      store_raw: true
      action_on_match: report
      severity: low
    match_type: exactly_matches
    langs:
      python: '-?([1-8]?\d(\.\d{4,})?|90(\.0{4,})?)'
      go: '-?([1-8]?\d(\.\d{4,})?|90(\.0{4,})?)'
      java: '-?([1-8]?\d(\.\d{4,})?|90(\.0{4,})?)'
      javascript: '-?([1-8]?\d(\.\d{4,})?|90(\.0{4,})?)'

  - id: longitude_01
    location: comm
    category: location
    description: Decimal longitude (4+ decimal places)
    pattern: '-?((1[0-7]\d|[1-9]?\d)(\.\d{4,})?|180(\.0{4,})?)'
    mask: "###.####"
    verification: longitude_valid
    examples:
      match:
        - "127.1234"
        - "-150.67890"
      nomatch:
        - "181.0000"
        - "127.123"
    policy:
      store_raw: true
      action_on_match: report
      severity: low
    match_type: exactly_matches
    langs:
      python: '-?((1[0-7]\d|[1-9]?\d)(\.\d{4,})?|180(\.0{4,})?)'
      go: '-?((1[0-7]\d|[1-9]?\d)(\.\d{4,})?|180(\.0{4,})?)'
      java: '-?((1[0-7]\d|[1-9]?\d)(\.\d{4,})?|180(\.0{4,})?)'
      javascript: '-?((1[0-7]\d|[1-9]?\d)(\.\d{4,})?|180(\.0{4,})?)'

  - id: coordinates_dms_01
    location: comm
    category: location
    description: DMS format coordinate (e.g., 40°26'46"N)
    pattern: '\d{1,3}°\s*\d{1,2}′\s*\d{1,2}(?:\.\d+)?″\s*[NSEW]'
    mask: "###°##′##″*"
    verification: dms_coordinate
    examples:
      match:
        - "40°26′46″N"
        - "127°00′00″E"
      nomatch:
        - "40°26′46″"
        - "190°00′00″E"
    policy:
      store_raw: true
      action_on_match: report
      severity: low
    match_type: exactly_matches
    langs:
      python: '\d{1,3}°\s*\d{1,2}′\s*\d{1,2}(?:\.\d+)?″\s*[NSEW]'
      go: '\d{1,3}°\s*\d{1,2}′\s*\d{1,2}(?:\.\d+)?″\s*[NSEW]'
      java: '\d{1,3}°\s*\d{1,2}′\s*\d{1,2}(?:\.\d+)?″\s*[NSEW]'
      javascript: '\d{1,3}°\s*\d{1,2}′\s*\d{1,2}(?:\.\d+)?″\s*[NSEW]'
