namespace: comm
description: Common patterns for English names
patterns:
- id: name_en_01
  location: comm
  category: other
  description: English Name (First Last or First Middle Last)
  pattern: \b[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}\b
  verification: english_name_valid
  mask: '*'
  examples:
    match:
    - John Doe
    - James Smith
    - Mary Johnson
    - Michael Robert Williams
    nomatch:
    - john doe
    - A
    - John
    - michael brown
    - 12345
  policy:
    store_raw: true
    action_on_match: report
    severity: low
  metadata:
    note: Detects capitalized English names (First Last or First Middle Last).
      Uses verification against common surnames and given names.
  match_type: exactly_matches
  langs:
    python: \b[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}\b
    go: \b[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}\b
    java: \b[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}\b
    javascript: \b[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2}\b
