namespace: eu
description: EU VAT (Value Added Tax) numbers for GDPR compliance
patterns:
- id: vat_germany_01
  location: eu
  category: other
  description: German VAT number (DE + 9 digits)
  pattern: DE\s*[0-9]{9}
  mask: DE*********
  examples:
    match:
    - DE123456789
    - DE 123456789
    - DE987654321
    nomatch:
    - DE12345678
    - DE1234567890
    - '123456789'
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: German VAT number format. Required for GDPR compliance when processing business
      data.
  priority: 150
  match_type: exactly_matches
  langs:
    python: DE\s*[0-9]{9}
    go: DE\s*[0-9]{9}
    java: DE\s*[0-9]{9}
    javascript: DE\s*[0-9]{9}
- id: vat_france_01
  location: eu
  category: other
  description: French VAT number (FR + 2 alphanumeric + 9 digits)
  pattern: FR\s*[A-Z0-9]{2}\s*[0-9]{9}
  mask: FR***********
  examples:
    match:
    - FR12345678901
    - FR AB123456789
    - FR K7123456789
    nomatch:
    - FR123456789
    - FR1234567890
    - DE123456789
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: French VAT number format (TVA intracommunautaire)
  priority: 150
  match_type: exactly_matches
  langs:
    python: FR\s*[A-Z0-9]{2}\s*[0-9]{9}
    go: FR\s*[A-Z0-9]{2}\s*[0-9]{9}
    java: FR\s*[A-Z0-9]{2}\s*[0-9]{9}
    javascript: FR\s*[A-Z0-9]{2}\s*[0-9]{9}
- id: vat_italy_01
  location: eu
  category: other
  description: Italian VAT number (IT + 11 digits)
  pattern: IT\s*[0-9]{11}
  mask: IT***********
  examples:
    match:
    - IT12345678901
    - IT 12345678901
    - IT98765432109
    nomatch:
    - IT1234567890
    - IT123456789012
    - '12345678901'
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Italian VAT number (Partita IVA)
  priority: 150
  match_type: exactly_matches
  langs:
    python: IT\s*[0-9]{11}
    go: IT\s*[0-9]{11}
    java: IT\s*[0-9]{11}
    javascript: IT\s*[0-9]{11}
- id: vat_spain_01
  location: eu
  category: other
  description: Spanish VAT number (ES + letter/digit + 7-8 digits + letter/digit)
  pattern: ES\s*[A-Z0-9][0-9]{7,8}[A-Z0-9]
  mask: ES**********
  examples:
    match:
    - ESX12345678
    - ES A1234567B
    - ES12345678Z
    - ES123456789
    nomatch:
    - ES1234567
    - ES12345678901
    - 12345678X
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Spanish VAT number (NIF - Número de Identificación Fiscal). Can be all digits
      or include letters.
  priority: 150
  match_type: exactly_matches
  langs:
    python: ES\s*[A-Z0-9][0-9]{7,8}[A-Z0-9]
    go: ES\s*[A-Z0-9][0-9]{7,8}[A-Z0-9]
    java: ES\s*[A-Z0-9][0-9]{7,8}[A-Z0-9]
    javascript: ES\s*[A-Z0-9][0-9]{7,8}[A-Z0-9]
- id: vat_netherlands_01
  location: eu
  category: other
  description: Dutch VAT number (NL + 9 digits + B + 2 digits)
  pattern: NL\s*[0-9]{9}\s*B\s*[0-9]{2}
  mask: NL*********B**
  examples:
    match:
    - NL123456789B01
    - NL 123456789 B 01
    - NL999999999B99
    nomatch:
    - NL123456789
    - NL123456789B1
    - NL12345678B01
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Dutch VAT number (BTW-nummer)
  priority: 150
  match_type: exactly_matches
  langs:
    python: NL\s*[0-9]{9}\s*B\s*[0-9]{2}
    go: NL\s*[0-9]{9}\s*B\s*[0-9]{2}
    java: NL\s*[0-9]{9}\s*B\s*[0-9]{2}
    javascript: NL\s*[0-9]{9}\s*B\s*[0-9]{2}
