- id: vat_ireland_01
  location: eu
  category: other
  description: Irish VAT number (IE + digit/letter + 7 digits + letter OR IE + 7 digits
    + 2 letters)
  pattern: IE\s*(?:[0-9][A-Z0-9][0-9]{5}[A-Z]|[0-9]{7}[A-Z]{2})
  mask: IE*********
  examples:
    match:
    - IE1234567A
    - IE 1A23456B
    - IE1234567AB
    nomatch:
    - IE12345678
    - IE123456
    - 1234567A
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Irish VAT number (VAT registration number)
  priority: 150
  match_type: exactly_matches
  langs:
    python: IE\s*(?:[0-9][A-Z0-9][0-9]{5}[A-Z]|[0-9]{7}[A-Z]{2})
    go: IE\s*(?:[0-9][A-Z0-9][0-9]{5}[A-Z]|[0-9]{7}[A-Z]{2})
    java: IE\s*(?:[0-9][A-Z0-9][0-9]{5}[A-Z]|[0-9]{7}[A-Z]{2})
    javascript: IE\s*(?:[0-9][A-Z0-9][0-9]{5}[A-Z]|[0-9]{7}[A-Z]{2})
