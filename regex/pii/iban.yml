namespace: co
description: IBAN (International Bank Account Number) patterns with Mod-97 verification
patterns:
- id: iban_01
  location: co
  category: iban
  description: International Bank Account Number (IBAN) with Mod-97 verification
  pattern: '[A-Z]{2}\d{2}[A-Z0-9]{11,30}'
  mask: '********************'
  verification: iban_mod97
  examples:
    match:
    - GB82WEST12345698765432
    - DE89370400440532013000
    - FR1420041010050500013M02606
    - IT60X0542811101000000123456
    nomatch:
    - GB82WEST1234569876543
    - '1234567890'
    - ABCD1234567890123456
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  match_type: exactly_matches
  langs:
    python: '[A-Z]{2}\d{2}[A-Z0-9]{11,30}'
    go: '[A-Z]{2}\d{2}[A-Z0-9]{11,30}'
    java: '[A-Z]{2}\d{2}[A-Z0-9]{11,30}'
    javascript: '[A-Z]{2}\d{2}[A-Z0-9]{11,30}'
