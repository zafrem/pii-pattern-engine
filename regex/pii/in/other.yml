namespace: in
description: India other patterns (postal codes, tax IDs, bank codes)
patterns:
- id: pincode_01
  location: in
  category: address
  description: Indian PIN code (6 digits)
  pattern: '[1-9][0-9]{5}'
  verification: in_pincode_valid
  mask: '******'
  examples:
    match:
    - '110001'
    - '400001'
    - '560001'
    nomatch:
    - '11000'
    - '1100011'
    - A10001
    - '000001'
    - '123456'
    - '111111'
  policy:
    store_raw: false
    action_on_match: report
    severity: low
  match_type: exactly_matches
  langs:
    python: '[1-9][0-9]{5}'
    go: '[1-9][0-9]{5}'
    java: '[1-9][0-9]{5}'
    javascript: '[1-9][0-9]{5}'
- id: ifsc_01
  location: in
  category: bank
  description: IFSC code (4 letters + 7 alphanumeric)
  pattern: '[A-Z]{4}[0-9A-Z]{7}'
  flags:
  - IGNORECASE
  mask: AAAA*******
  examples:
    match:
    - SBIN0001234
    - HDFC0000123
    - icic0001abc
    nomatch:
    - SBI0001234
    - SBIN000123
    - SBIN00012345
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Indian Financial System Code for bank branches
  match_type: exactly_matches
  langs:
    python: '[A-Z]{4}[0-9A-Z]{7}'
    go: '[A-Z]{4}[0-9A-Z]{7}'
    java: '[A-Z]{4}[0-9A-Z]{7}'
    javascript: '[A-Z]{4}[0-9A-Z]{7}'
- id: gst_01
  location: in
  category: other
  description: GST number (15 characters)
  pattern: '[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z][A-Z0-9]'
  flags:
  - IGNORECASE
  mask: '**AAAAA****A*A*'
  examples:
    match:
    - 27AAPFU0939F1ZV
    - 09ABCDE1234F1Z5
    - 29abcde1234f1z5
    nomatch:
    - 2AAPFU0939F1ZV
    - 27AAPFU0939F1Z
    - 27AAPFU0939F1ZVV
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Goods and Services Tax Identification Number
  match_type: exactly_matches
  langs:
    python: '[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z][A-Z0-9]'
    go: '[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z][A-Z0-9]'
    java: '[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z][A-Z0-9]'
    javascript: '[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][0-9][A-Z][A-Z0-9]'
