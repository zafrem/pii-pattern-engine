namespace: jp
description: Japan bank account patterns
patterns:
- id: mizuho_bank_account_01
  location: jp
  category: bank
  description: Mizuho Bank account (0001-XXX-XXXXXXX)
  pattern: 0001-?[0-9]{3}-?[0-9]{7}
  mask: 0001-***-*******
  examples:
    match:
    - 0001-123-1234567
    - '00011231234567'
    - 0001-456-7890123
    nomatch:
    - 0002-123-1234567
    - 0001-12-1234567
    - 0001-123-123456
  policy:
    store_raw: false
    action_on_match: redact
    severity: critical
  metadata:
    note: Mizuho Bank (みずほ銀行) - One of Japan's three megabanks
  match_type: exactly_matches
  langs:
    python: 0001-?[0-9]{3}-?[0-9]{7}
    go: 0001-?[0-9]{3}-?[0-9]{7}
    java: 0001-?[0-9]{3}-?[0-9]{7}
    javascript: 0001-?[0-9]{3}-?[0-9]{7}
