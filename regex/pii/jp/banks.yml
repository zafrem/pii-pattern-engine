- id: generic_japanese_bank_account_01
  location: jp
  category: bank
  description: Generic Japanese bank account (XXXX-XXX-XXXXXXX)
  pattern: '[0-9]{4}-?[0-9]{3}-?[0-9]{7}'
  mask: '****-***-*******'
  verification: generic_number_not_timestamp
  examples:
    match:
    - 1234-567-8901234
    - '12345678901234'
    - 9999-001-1111111
    nomatch:
    - 123-567-8901234
    - 1234-56-8901234
    - 1234-567-890123
  policy:
    store_raw: false
    action_on_match: redact
    severity: critical
  metadata:
    note: 'Generic format for Japanese banks: 4-digit bank code + 3-digit branch code
      + 7-digit account number'
  priority: 100
  match_type: exactly_matches
  langs:
    python: '[0-9]{4}-?[0-9]{3}-?[0-9]{7}'
    go: '[0-9]{4}-?[0-9]{3}-?[0-9]{7}'
    java: '[0-9]{4}-?[0-9]{3}-?[0-9]{7}'
