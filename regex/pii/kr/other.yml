namespace: kr
description: Korean other patterns (business registration, corporate registration,
  names, addresses)
patterns:
- id: business_registration_01
  location: kr
  category: other
  description: Korean Business Registration Number (사업자등록번호)
  pattern: '[0-9]{3}-[0-9]{2}-[0-9]{5}'
  verification: kr_business_registration_valid
  mask: '***-**-****#'
  examples:
    match:
    - 123-45-67891
    nomatch:
    - 123-45-67890
    - 1234567891
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  match_type: exactly_matches
  langs:
    python: '[0-9]{3}-[0-9]{2}-[0-9]{5}'
    go: '[0-9]{3}-[0-9]{2}-[0-9]{5}'
    java: '[0-9]{3}-[0-9]{2}-[0-9]{5}'
    javascript: '[0-9]{3}-[0-9]{2}-[0-9]{5}'
- id: corporate_registration_01
  location: kr
  category: other
  description: Korean Corporate Registration Number (법인등록번호)
  pattern: '[0-9]{6}-[0-9]{7}'
  verification: kr_corporate_registration_valid
  mask: '******-******#'
  examples:
    match:
    - 110111-0003204
    nomatch:
    - 123456-1234567
    - '1234561234568'
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  match_type: exactly_matches
  langs:
    python: '[0-9]{6}-[0-9]{7}'
    go: '[0-9]{6}-[0-9]{7}'
    java: '[0-9]{6}-[0-9]{7}'
    javascript: '[0-9]{6}-[0-9]{7}'
- id: name_01
  location: kr
  category: other
  description: Korean Name (2-5 characters)
  pattern: '[가-힣]{2,5}'
  verification: korean_name_valid
  mask: '*'
  examples:
    match:
    - 김철수
    - 이영희
    - 박지성
    nomatch:
    - 김
    - 김철수무궁화
    - abc
  policy:
    store_raw: true
    action_on_match: report
    severity: low
  metadata:
    note: Detects Korean names with known surname prefixes. Uses surname verification
      to reduce false positives.
  match_type: exactly_matches
  langs:
    python: '[가-힣]{2,5}'
    go: '[가-힣]{2,5}'
    java: '[가-힣]{2,5}'
    javascript: '[가-힣]{2,5}'

- id: address_01
  location: kr
  category: address
  description: Korean Address (Province + City/District + Street)
  pattern: '(?:서울특별시|경기도|부산광역시|인천광역시|대구광역시|대전광역시|광주광역시|울산광역시|세종특별자치시|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도)\s+[가-힣]{2,10}(?:시|군|구)(?:\s+[가-힣]{2,10}(?:시|군|구))?(?:\s+[가-힣0-9]{2,10}(?:로|길|동|리))?'
  verification: korean_address_valid
  mask: '*** *** ***'
  examples:
    match:
    - 서울특별시 강남구 삼성동
    - 경기도 수원시 팔달구
    nomatch:
    - 서울특별시
    - 강남구
    - 미국 뉴욕
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  metadata:
    note: Uses address database verification to ensure valid province and city/district combinations.
  match_type: exactly_matches
  langs:
    python: '(?:서울특별시|경기도|부산광역시|인천광역시|대구광역시|대전광역시|광주광역시|울산광역시|세종특별자치시|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도)\s+[가-힣]{2,10}(?:시|군|구)(?:\s+[가-힣]{2,10}(?:시|군|구))?(?:\s+[가-힣0-9]{2,10}(?:로|길|동|리))?'
    go: '(?:서울특별시|경기도|부산광역시|인천광역시|대구광역시|대전광역시|광주광역시|울산광역시|세종특별자치시|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도)\s+[가-힣]{2,10}(?:시|군|구)(?:\s+[가-힣]{2,10}(?:시|군|구))?(?:\s+[가-힣0-9]{2,10}(?:로|길|동|리))?'
    java: '(?:서울특별시|경기도|부산광역시|인천광역시|대구광역시|대전광역시|광주광역시|울산광역시|세종특별자치시|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도)\s+[가-힣]{2,10}(?:시|군|구)(?:\s+[가-힣]{2,10}(?:시|군|구))?(?:\s+[가-힣0-9]{2,10}(?:로|길|동|리))?'
    javascript: '(?:서울특별시|경기도|부산광역시|인천광역시|대구광역시|대전광역시|광주광역시|울산광역시|세종특별자치시|강원도|충청북도|충청남도|전라북도|전라남도|경상북도|경상남도|제주특별자치도)\s+[가-힣]{2,10}(?:시|군|구)(?:\s+[가-힣]{2,10}(?:시|군|구))?(?:\s+[가-힣0-9]{2,10}(?:로|길|동|리))?'

- id: personal_customs_code_01
  location: kr
  category: other
  description: Korean Personal Customs Clearance Code (PCCC)
  pattern: '[pP][0-9]{12}'
  verification: kr_pccc_valid
  mask: 'P************'
  examples:
    match:
    - P123456789012
    - p123456789012
    nomatch:
    - P12345678901
    - A123456789012
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  match_type: exactly_matches
  langs:
    python: '[pP][0-9]{12}'
    go: '[pP][0-9]{12}'
    java: '[pP][0-9]{12}'
    javascript: '[pP][0-9]{12}'

