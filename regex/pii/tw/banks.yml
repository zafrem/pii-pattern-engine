- id: generic_taiwan_bank_account_01
  location: tw
  category: bank
  description: Generic Taiwan bank account (XXX-XXXXXXXXXXXX)
  pattern: '[0-9]{3}-?[0-9]{9,13}'
  mask: '***-*********'
  verification: generic_number_not_timestamp
  examples:
    match:
    - 123-456789012345
    - '999123456789012'
    - 001-12345678901
    - 888-987654321098
    nomatch:
    - 12-45678901
    - 1234-567890123
    - 123-12345678
    - 123-123456789012345678
  policy:
    store_raw: false
    action_on_match: redact
    severity: critical
  metadata:
    note: 'Generic format for Taiwan banks: 3-digit bank code + 9-13 digit account
      number'
  priority: 100
  match_type: exactly_matches
  langs:
    python: '[0-9]{3}-?[0-9]{9,13}'
    go: '[0-9]{3}-?[0-9]{9,13}'
    java: '[0-9]{3}-?[0-9]{9,13}'
