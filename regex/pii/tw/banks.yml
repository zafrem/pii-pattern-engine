namespace: tw
description: Taiwan bank account patterns
patterns:
- id: bank_of_taiwan_account_01
  location: tw
  category: bank
  description: Bank of Taiwan account (004-XXXXXXXXXXXX)
  pattern: 004-?[0-9]{9,13}
  mask: 004-*********
  examples:
    match:
    - 004-123456789012
    - 004123456789012
    - 004-987654321098
    - 004-12345678901
    nomatch:
    - 005-123456789012
    - 004-12345678
    - 004-12345678901234
    - 04-123456789012
  policy:
    store_raw: false
    action_on_match: redact
    severity: critical
  metadata:
    note: Bank of Taiwan (臺灣銀行) - Taiwan's central bank and largest government bank
  match_type: exactly_matches
  langs:
    python: 004-?[0-9]{9,13}
    go: 004-?[0-9]{9,13}
    java: 004-?[0-9]{9,13}
    javascript: 004-?[0-9]{9,13}
