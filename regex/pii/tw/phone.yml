namespace: tw
description: Taiwan phone number patterns
patterns:
- id: mobile_01
  location: tw
  category: phone
  description: Taiwan mobile phone number (09XX-XXX-XXX)
  pattern: 09[0-9]{2}-?[0-9]{3}-?[0-9]{3}
  mask: 09**-***-***
  examples:
    match:
    - 0912-345-678
    - 0987654321
    - 0923-456-789
    nomatch:
    - 0812-345-678
    - 09123-45-678
    - 091-234-5678
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  match_type: exactly_matches
  langs:
    python: 09[0-9]{2}-?[0-9]{3}-?[0-9]{3}
    go: 09[0-9]{2}-?[0-9]{3}-?[0-9]{3}
    java: 09[0-9]{2}-?[0-9]{3}-?[0-9]{3}
    javascript: 09[0-9]{2}-?[0-9]{3}-?[0-9]{3}
- id: mobile_02
  location: tw
  category: phone
  description: Taiwan mobile phone number with closing parenthesis (09XX)XXX-XXX)
  pattern: 09[0-9]{2}\)[0-9]{3}-?[0-9]{3}
  mask: 09**)***-***
  examples:
    match:
    - 0912)345-678
    - 0923)456-789
    - 0987)654321
    nomatch:
    - 0812)345-678
    - 09123-45-678
    - 091-234-5678
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  match_type: exactly_matches
  langs:
    python: 09[0-9]{2}\)[0-9]{3}-?[0-9]{3}
    go: 09[0-9]{2}\)[0-9]{3}-?[0-9]{3}
    java: 09[0-9]{2}\)[0-9]{3}-?[0-9]{3}
    javascript: 09[0-9]{2}\)[0-9]{3}-?[0-9]{3}
- id: landline_01
  location: tw
  category: phone
  description: Taiwan landline number (area code + number)
  pattern: 0[2-8]-?[0-9]{7,8}
  mask: 0*-********
  examples:
    match:
    - 02-12345678
    - 07-1234567
    - 04-23456789
    - 0212345678
    nomatch:
    - 01-12345678
    - 09-12345678
    - 02-123456
  policy:
    store_raw: false
    action_on_match: report
    severity: low
  match_type: exactly_matches
  langs:
    python: 0[2-8]-?[0-9]{7,8}
    go: 0[2-8]-?[0-9]{7,8}
    java: 0[2-8]-?[0-9]{7,8}
    javascript: 0[2-8]-?[0-9]{7,8}
- id: landline_02
  location: tw
  category: phone
  description: Taiwan landline number with closing parenthesis
  pattern: 0[2-8]\)[0-9]{7,8}
  verification: not_repeating_pattern
  mask: 0*-)********
  examples:
    match:
    - 02)12345678
    - 07)1234567
    - 04)23456789
    nomatch:
    - 01)12345678
    - 09)12345678
    - 02)123456
  policy:
    store_raw: false
    action_on_match: report
    severity: low
  match_type: exactly_matches
  langs:
    python: 0[2-8]\)[0-9]{7,8}
    go: 0[2-8]\)[0-9]{7,8}
    java: 0[2-8]\)[0-9]{7,8}
    javascript: 0[2-8]\)[0-9]{7,8}
