namespace: us
description: United States other patterns (ZIP code, EIN)
patterns:
- id: ein_01
  location: us
  category: other
  description: Employer Identification Number (XX-XXXXXXX)
  pattern: '[0-9]{2}-[0-9]{7}'
  verification: not_timestamp
  mask: '**-*******'
  examples:
    match:
    - 12-3456789
    - 98-7654321
    - 45-6789012
    - 78-9012345
    nomatch:
    - 123-456789
    - 12-345678
    - 12-34567890
    - '123456789'
    - 1-23456789
  policy:
    store_raw: false
    action_on_match: report
    severity: medium
  metadata:
    note: Requires hyphen separator. Uses verification to reject timestamps.
  priority: 150
  match_type: exactly_matches
  langs:
    python: '[0-9]{2}-[0-9]{7}'
    go: '[0-9]{2}-[0-9]{7}'
    java: '[0-9]{2}-[0-9]{7}'
    javascript: '[0-9]{2}-[0-9]{7}'

- id: address_01
  location: us
  category: address
  description: US Address (City, State)
  pattern: '\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*,\s+[A-Z]{2}\b'
  verification: us_address_valid
  mask: '***, **'
  examples:
    match:
    - New York, NY
    - Los Angeles, CA
    nomatch:
    - New York
    - NY
    - London, UK
  policy:
    store_raw: false
    action_on_match: redact
    severity: high
  metadata:
    note: Uses address database verification to ensure valid city and state combinations.
  match_type: exactly_matches
  langs:
    python: '\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*,\s+[A-Z]{2}\b'
    go: '\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*,\s+[A-Z]{2}\b'
    java: '\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*,\s+[A-Z]{2}\b'
    javascript: '\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)*,\s+[A-Z]{2}\b'
